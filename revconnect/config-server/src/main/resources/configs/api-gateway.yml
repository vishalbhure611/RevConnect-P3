server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**, /api/auth/**

        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/posts/**, /api/comments/**, /api/likes/**
          filters:
            - JwtAuthentication

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - JwtAuthentication

        - id: social-service
          uri: lb://social-service
          predicates:
            - Path=/api/follows/**, /api/connections/**
          filters:
            - JwtAuthentication

        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - JwtAuthentication

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuthentication

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:revconnect-secret-key-for-jwt-token-generation-2026-secure-microservices}
